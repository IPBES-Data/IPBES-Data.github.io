name: QA

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("gh", "knitr", "data.tree", "rvest", "DT", "jsonlite"), repos = "https://cloud.r-project.org")'

      - name: Validate property detection heuristics
        run: Rscript scripts/validate_property_detection.R

      - name: Render website
        run: quarto render

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress _site/**/*.html
