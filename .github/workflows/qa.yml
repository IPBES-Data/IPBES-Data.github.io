name: QA

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  render-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Setup R package dependencies (cached)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::gh
            any::knitr
            any::data.tree
            any::rvest
            any::DT
            any::jsonlite

      - name: Validate property detection heuristics
        run: Rscript scripts/validate_property_detection.R

      - name: Render website
        run: quarto render
